name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dashboard frontend
        working-directory: web/ui
        run: npm ci && npm run build

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -count=1 -timeout 120s

      - name: Go test (race detector)
        if: runner.os == 'Linux'
        run: go test ./... -race -count=1 -timeout 180s

      - name: Build labyrinth
        run: go build -ldflags="-s -w" -o labyrinth${{ runner.os == 'Windows' && '.exe' || '' }} .

      - name: Build labyrinth-bench
        run: go build -ldflags="-s -w" -o labyrinth-bench${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/labyrinth-bench/

      - name: Fuzz (30s each)
        if: runner.os == 'Linux'
        run: |
          go test ./dns/ -fuzz=FuzzUnpack -fuzztime=30s || true
          go test ./dns/ -fuzz=FuzzDecodeName -fuzztime=30s || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: |
            labyrinth*
            !labyrinth*.go

  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build website
        working-directory: website
        run: npm ci && npm run build

      - name: Verify build output
        run: test -f website/dist/index.html
