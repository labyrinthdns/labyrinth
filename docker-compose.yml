services:
  labyrinth:
    image: ghcr.io/labyrinthdns/labyrinth:latest
    # Or build locally:
    # build: .
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "9153:9153/tcp"
    volumes:
      - ./labyrinth.yaml:/etc/labyrinth/labyrinth.yaml:ro
    command: ["-config", "/etc/labyrinth/labyrinth.yaml"]
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
